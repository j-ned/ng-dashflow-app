server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # add_header n'est PAS hérité par un location qui définit lui-même un add_header (règle nginx) :
  # dupliqué explicitement dans les deux blocs ci-dessous plutôt que posé une fois au niveau server.
  # CSP : connect-src limité à l'API DashFlow + Sentry ; unsafe-inline sur style-src requis par
  # Angular/Tailwind (styles inline générés par le framework), pas de script-src élargi.
  set $csp "default-src 'self'; connect-src 'self' https://api-dashflow.nedellec-julien.fr https://*.ingest.de.sentry.io; img-src 'self' data: https://api-dashflow.nedellec-julien.fr; style-src 'self' 'unsafe-inline'; base-uri 'self'; frame-ancestors 'none'";

  # Assets buildés (hash dans le nom) : jamais de fallback SPA.
  # Sans ce bloc, un chunk supprimé par un déploiement suivant (ex: main-OLDHASH.js)
  # retombe sur index.html via le fallback ci-dessous -> 200 text/html au lieu de 404,
  # et le navigateur plante avec "'text/html' is not a valid JavaScript MIME type."
  location ~* \.(?:js|css|svg|png|jpg|jpeg|gif|ico|webp|avif|woff2?|ttf|map)$ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=31536000, immutable";
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  }

  # SPA: route inconnue → index.html (jamais mis en cache pour éviter de servir
  # une coquille référençant des chunks obsolètes après déploiement)
  location / {
    add_header Cache-Control "no-cache";
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy $csp always;
    try_files $uri $uri/ /index.html;
  }
  # Prod : pas de proxy /api ici — le backend (repo nest-dashflow-app) est déployé sur son propre
  # sous-domaine (api-dashflow.nedellec-julien.fr), appelé directement par le frontend via CORS.
}
